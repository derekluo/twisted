<!DOCTYPE html>
<html>
<body>
<script>
async function wgslFingerprint() {
  if (!navigator.gpu) {
    return "WebGPU_not_supported";
  }

  try {
    const adapter = await navigator.gpu.requestAdapter();
    const device = await adapter.requestDevice();

    // 🔥 修复：改用高熵浮点计算 + 多操作混合，永远不会出全0
    const shader = `
      @compute @workgroup_size(1)
      fn main() {
        var f1: f32 = 1.0000001;
        var f2: f32 = 2.0000002;
        var f3: f32 = 3.0000003;
        
        // 高熵混合计算
        var val = sin(f1) * cos(f2) + tan(f3) * 12345.6789;

        // 转成无符号整数输出
        output[0] = bitcast<u32>(val);
      }

      @group(0) @binding(0) var<storage, read_write> output: array<u32>;
    `;

    const module = device.createShaderModule({ code: shader });
    const pipeline = device.createComputePipeline({
      layout: "auto",
      compute: { module, entryPoint: "main" }
    });

    const buf = device.createBuffer({
      size: 4,
      usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC
    });
    const readBuf = device.createBuffer({
      size: 4,
      usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
    });

    const bindGroup = device.createBindGroup({
      layout: pipeline.getBindGroupLayout(0),
      entries: [{ binding: 0, resource: { buffer: buf } }]
    });

    const encoder = device.createCommandEncoder();
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.dispatchWorkgroups(1);
    pass.end();
    encoder.copyBufferToBuffer(buf, 0, readBuf, 0, 4);
    device.queue.submit([encoder.finish()]);

    await readBuf.mapAsync(GPUMapMode.READ);
    const arr = new Uint32Array(readBuf.getMappedRange()).slice();
    readBuf.unmap();
    device.destroy();

    return `WGSL_fp_${arr[0].toString(16).padStart(8, '0')}`;
  } catch (e) {
    return "WebGPU_error";
  }
}

wgslFingerprint().then(fp => {
  console.log("✅ 最终 WGSL 指纹：", fp);
  document.body.innerHTML = `<h1>${fp}</h1>`;
});
</script>
</body>
</html>
